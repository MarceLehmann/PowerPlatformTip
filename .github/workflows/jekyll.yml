# separate terms of service, privacy policy, and support
# documentation.

# Baut und deployt die Jekyll-Site ueber GitHub Actions.
name: Deploy Jekyll site to Pages

on:
  # Laeuft bei Pushes auf den Default-Branch
  push:
    branches: ["master"]

  # Taeglicher Rebuild, damit terminierte (zukuenftig datierte) Posts automatisch erscheinen
  schedule:
    - cron: '5 4 * * *'   # 04:05 UTC

  # Manueller Trigger im Actions-Tab / via gh CLI
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Write Bing Analytics key (Clarity)
        run: |
          if [ -z "${{ secrets.BINGANALYTICSKEY }}" ]; then
            echo "BINGANALYTICSKEY is not set; skipping Clarity setup"
            exit 0
          fi
          mkdir -p _data
          echo "key: ${{ secrets.BINGANALYTICSKEY }}" > _data/bing_analytics.yml
      - name: Setup Ruby
        uses: ruby/setup-ruby@4a9ddd6f338a97768b8006bf671dfbad383215f4
        with:
          ruby-version: '3.1'
          bundler-cache: true
          cache-version: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Setup IndexNow Key File
        run: echo "${{ secrets.INDEXNOW_KEY }}" > c50323b8794e4a118d52d2ef430cbedd.txt
      - name: Copy IndexNow Key to output directory
        run: cp c50323b8794e4a118d52d2ef430cbedd.txt _site/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
